<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>YT Downloader</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand: #5C3030;
    --brand-dark: #4a2626;
    --brand-light: #f7f0f0;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-700: #374151;
    --gray-900: #111827;
    --shadow-flat: 0 1px 3px rgba(0,0,0,0.02);
    --shadow-dropdown: 0 4px 20px rgba(0,0,0,0.08);
    --cobalt: https://cobalt-api-production-7a41.up.railway.app;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }

  /* ── Header ── */
  .header {
    background: #fff;
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-flat);
    position: sticky; top: 0; z-index: 100;
  }
  .header-inner {
    width: 100%; max-width: 700px; margin: 0 auto;
    padding: 0 16px; height: 52px;
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 28px; height: 28px; background: var(--brand);
    border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo-text { font-size: 15px; font-weight: 700; color: var(--gray-900); letter-spacing: -0.3px; }
  .logo-text span { color: var(--brand); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--gray-300);
    transition: background 0.3s;
  }
  .status-dot.online { background: #22c55e; }
  .status-dot.error { background: #ef4444; }
  .status-label {
    font-size: 11px; font-family: 'Inter', sans-serif;
    color: var(--gray-500); font-weight: 500;
  }

  /* ── Main ── */
  .main {
    width: 100%; max-width: 700px; margin: 0 auto;
    padding: 20px 16px 40px;
    display: flex; flex-direction: column; gap: 14px;
  }

  /* ── Card ── */
  .card {
    background: #fff;
    border: 1px solid var(--gray-200);
    border-radius: 10px;
    box-shadow: var(--shadow-flat);
    overflow: hidden;
  }
  .card-pad { padding: 14px 16px; }
  .section-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--gray-500);
    font-family: 'Inter', sans-serif; display: block; margin-bottom: 10px;
  }

  /* ── Input ── */
  .input-wrap { position: relative; }
  .url-input {
    width: 100%; padding: 10px 38px 10px 12px;
    background: #fff; border: 1px solid var(--gray-200); border-radius: 8px;
    font-size: 13.5px; font-family: 'Sora', sans-serif; color: var(--gray-900);
    outline: none; transition: border-color 0.15s; line-height: 1.4;
  }
  .url-input::placeholder { color: var(--gray-400); }
  .url-input:focus { border-color: var(--brand); }
  .input-clear {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; color: var(--gray-400);
    display: none; padding: 3px; border-radius: 3px; line-height: 0;
  }
  .input-clear.visible { display: block; }

  .input-actions {
    display: flex; gap: 8px; margin-top: 8px; align-items: center;
  }
  .btn-primary {
    flex: 1; background: var(--brand); color: #fff; border: none;
    border-radius: 8px; font-family: 'Sora', sans-serif; font-size: 13px;
    font-weight: 600; padding: 10px 16px; cursor: pointer;
    transition: background 0.15s; display: flex; align-items: center;
    justify-content: center; gap: 6px;
  }
  .btn-primary:active { background: var(--brand-dark); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    background: #fff; color: var(--gray-700);
    border: 1px solid var(--gray-200); border-radius: 8px;
    font-family: 'Sora', sans-serif; font-size: 13px; font-weight: 600;
    padding: 10px 14px; cursor: pointer; transition: background 0.15s;
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
  }
  .btn-secondary:hover { background: var(--gray-50); }

  /* ── Spinner ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite; flex-shrink: 0;
  }

  /* ── Video Preview ── */
  .video-preview { display: none; }
  .video-preview.visible { display: block; }

  .video-meta {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 14px 16px; border-bottom: 1px solid var(--gray-100);
  }
  .video-thumb {
    width: 96px; height: 58px; border-radius: 6px;
    background: var(--gray-100); flex-shrink: 0; overflow: hidden;
  }
  .video-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .video-info { flex: 1; min-width: 0; }
  .video-title {
    font-size: 13px; font-weight: 600; color: var(--gray-900);
    line-height: 1.4; margin-bottom: 6px;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .video-chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    font-size: 10.5px; font-family: 'Inter', sans-serif; color: var(--gray-500);
    background: var(--gray-100); border-radius: 4px; padding: 2px 7px;
    display: flex; align-items: center; gap: 3px;
  }

  /* ── Quality Options ── */
  .quality-tabs {
    display: flex; border-bottom: 1px solid var(--gray-200); padding: 0 16px;
  }
  .q-tab {
    font-size: 12px; font-weight: 600; color: var(--gray-500);
    padding: 9px 14px; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
    background: none; border-top: none; border-left: none; border-right: none;
    font-family: 'Sora', sans-serif;
  }
  .q-tab.active { color: var(--brand); border-bottom-color: var(--brand); }

  .quality-list { padding: 4px 0; }
  .quality-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-bottom: 1px solid var(--gray-100);
    cursor: pointer; transition: background 0.1s;
  }
  .quality-row:last-child { border-bottom: none; }
  .quality-row:hover { background: var(--gray-50); }
  .quality-row.selected { background: var(--brand-light); }

  .q-icon {
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .q-icon.vid { background: #fff0f0; color: var(--brand); }
  .q-icon.aud { background: #f0f4ff; color: #3b5bdb; }

  .q-info { flex: 1; min-width: 0; }
  .q-name { font-size: 13px; font-weight: 600; color: var(--gray-900); }
  .q-sub { font-size: 11px; color: var(--gray-500); font-family: 'Inter', sans-serif; margin-top: 1px; }
  .q-badge {
    font-size: 10px; font-family: 'Inter', sans-serif; font-weight: 600;
    padding: 2px 7px; border-radius: 4px; color: var(--gray-500);
    background: var(--gray-100); border: 1px solid var(--gray-200);
  }
  .q-radio {
    width: 16px; height: 16px; border: 1.5px solid var(--gray-300);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: border-color 0.15s;
  }
  .quality-row.selected .q-radio {
    border-color: var(--brand); background: var(--brand);
  }
  .quality-row.selected .q-radio::after {
    content: ''; width: 5px; height: 5px;
    background: #fff; border-radius: 50%;
  }

  /* ── Download Bar ── */
  .dl-bar {
    display: none; padding: 12px 16px;
    border-top: 1px solid var(--gray-200); background: var(--gray-50);
    align-items: center; gap: 10px;
  }
  .dl-bar.visible { display: flex; }
  .dl-info { flex: 1; min-width: 0; }
  .dl-info .lbl {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--gray-500); font-family: 'Inter', sans-serif;
  }
  .dl-info .val {
    font-size: 13px; font-weight: 600; color: var(--gray-900);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── Progress ── */
  .progress-wrap {
    display: none; padding: 12px 16px;
    border-top: 1px solid var(--gray-200); background: #fff;
    flex-direction: column; gap: 8px;
  }
  .progress-wrap.visible { display: flex; }
  .progress-top { display: flex; justify-content: space-between; align-items: center; }
  .progress-lbl { font-size: 12px; font-weight: 600; color: var(--gray-700); }
  .progress-pct { font-size: 12px; font-family: 'Inter', sans-serif; color: var(--brand); font-weight: 600; }
  .progress-bar-bg {
    width: 100%; height: 4px; background: var(--gray-200);
    border-radius: 99px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: var(--brand); border-radius: 99px;
    width: 0%; transition: width 0.4s ease;
  }

  /* ── History ── */
  .history-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-bottom: 1px solid var(--gray-100);
    transition: background 0.1s;
  }
  .history-row:last-child { border-bottom: none; }
  .h-icon {
    width: 30px; height: 30px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .h-icon.done { background: #f0faf4; color: #1a7f4b; }
  .h-icon.err  { background: #fff0f0; color: var(--brand); }
  .h-info { flex: 1; min-width: 0; }
  .h-title {
    font-size: 12.5px; font-weight: 600; color: var(--gray-900);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .h-sub { font-size: 11px; color: var(--gray-500); font-family: 'Inter', sans-serif; margin-top: 1px; }
  .h-status {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; font-family: 'Inter', sans-serif;
    padding: 2px 7px; border-radius: 4px; white-space: nowrap;
  }
  .s-done { background: #e6f7ed; color: #1a7f4b; }
  .s-err  { background: #fee2e2; color: #b91c1c; }

  /* ── Empty ── */
  .empty {
    padding: 32px 16px; text-align: center; color: var(--gray-400);
  }
  .empty p { font-size: 13px; margin-top: 10px; }

  /* ── Error Banner ── */
  .error-banner {
    display: none; margin: 0 16px 0;
    background: #fff0f0; border: 1px solid #fecaca;
    border-radius: 8px; padding: 10px 12px;
    font-size: 12px; color: #b91c1c; line-height: 1.5;
    align-items: flex-start; gap: 8px;
  }
  .error-banner.visible { display: flex; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--gray-900); color: #fff;
    font-size: 13px; font-weight: 500; padding: 10px 16px;
    border-radius: 8px; box-shadow: var(--shadow-dropdown);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; z-index: 999; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .history-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 0;
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5">
        <path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.54C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/>
        <polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="#fff" stroke="none"/>
      </svg>
    </div>
    <span class="logo-text">YT <span>Downloader</span></span>
    <div class="header-right">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-label" id="statusLabel">Checking…</span>
    </div>
  </div>
</header>

<main class="main">

  <!-- URL Input -->
  <div class="card">
    <div class="card-pad">
      <span class="section-label">YouTube URL</span>
      <div class="input-wrap">
        <input class="url-input" id="urlInput" type="url"
          placeholder="https://youtube.com/watch?v=..." autocomplete="off" spellcheck="false" />
        <button class="input-clear" id="clearBtn" onclick="clearInput()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="input-actions">
        <button class="btn-secondary" onclick="pasteURL()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
          </svg>
          Paste
        </button>
        <button class="btn-primary" id="analyzeBtn" onclick="analyzeVideo()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Analyze
        </button>
      </div>

      <!-- Error -->
      <div class="error-banner" id="errorBanner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="flex-shrink:0;margin-top:1px">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorText"></span>
      </div>
    </div>
  </div>

  <!-- Video Preview + Formats -->
  <div class="card video-preview" id="videoPreview">

    <div class="video-meta">
      <div class="video-thumb">
        <img id="videoThumb" src="" alt="" />
      </div>
      <div class="video-info">
        <div class="video-title" id="videoTitle">—</div>
        <div class="video-chips">
          <span class="chip" id="chipChannel">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            —
          </span>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="quality-tabs">
      <button class="q-tab active" id="tabVideo" onclick="switchTab('video')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:inline;vertical-align:middle;margin-right:3px"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        Video
      </button>
      <button class="q-tab" id="tabAudio" onclick="switchTab('audio')">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:inline;vertical-align:middle;margin-right:3px"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Audio Only
      </button>
    </div>

    <div class="tab-panel active" id="tab-video">
      <div class="quality-list" id="videoList"></div>
    </div>
    <div class="tab-panel" id="tab-audio">
      <div class="quality-list" id="audioList"></div>
    </div>

    <!-- Download Bar -->
    <div class="dl-bar" id="dlBar">
      <div class="dl-info">
        <div class="lbl">Selected</div>
        <div class="val" id="dlLabel">—</div>
      </div>
      <button class="btn-primary" id="dlBtn" onclick="startDownload()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Download
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-top">
        <span class="progress-lbl" id="progressLbl">Fetching download link…</span>
        <span class="progress-pct" id="progressPct"></span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>

  </div>

  <!-- History -->
  <div class="card">
    <div class="history-card-header">
      <span class="section-label" style="margin-bottom:0">Download History</span>
      <button class="btn-secondary" style="font-size:11px;padding:5px 10px;" onclick="clearHistory()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
        Clear
      </button>
    </div>
    <div id="historyList" style="margin-top:10px;"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
const COBALT_API = 'https://cobalt-api-production-7a41.up.railway.app';

// ── Quality options ──────────────────────────────────────────────────────────
const VIDEO_OPTS = [
  { id: '2160', label: '4K (2160p)', sub: 'MP4 · VP9+AAC', badge: '4K' },
  { id: '1080', label: 'Full HD (1080p)', sub: 'MP4 · H.264+AAC', badge: 'FHD' },
  { id: '720',  label: 'HD (720p)',       sub: 'MP4 · H.264+AAC', badge: 'HD' },
  { id: '480',  label: 'SD (480p)',       sub: 'MP4 · H.264+AAC', badge: 'SD' },
  { id: '360',  label: 'Low (360p)',      sub: 'MP4 · H.264+AAC', badge: '360' },
];
const AUDIO_OPTS = [
  { id: 'mp3-128',  label: 'MP3 — 128 kbps',  sub: 'Standard quality', badge: 'MP3' },
  { id: 'mp3-320',  label: 'MP3 — 320 kbps',  sub: 'High quality',     badge: 'HQ' },
  { id: 'ogg',      label: 'OGG Vorbis',       sub: 'Open format',      badge: 'OGG' },
  { id: 'wav',      label: 'WAV',              sub: 'Lossless',         badge: 'WAV' },
  { id: 'opus',     label: 'Opus',             sub: 'Best compression', badge: 'OPUS' },
];

// ── State ────────────────────────────────────────────────────────────────────
let selectedOpt = null;
let currentTab  = 'video';
let currentURL  = '';
let history     = JSON.parse(localStorage.getItem('yt_dl_history') || '[]');

// ── Input ────────────────────────────────────────────────────────────────────
const urlInput = document.getElementById('urlInput');
const clearBtn = document.getElementById('clearBtn');

urlInput.addEventListener('input', () => {
  clearBtn.classList.toggle('visible', urlInput.value.length > 0);
  hideError();
});
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') analyzeVideo(); });

function clearInput() {
  urlInput.value = '';
  clearBtn.classList.remove('visible');
  urlInput.focus();
  document.getElementById('videoPreview').classList.remove('visible');
  selectedOpt = null;
  hideError();
}

async function pasteURL() {
  try {
    const t = await navigator.clipboard.readText();
    if (t) { urlInput.value = t.trim(); clearBtn.classList.add('visible'); }
  } catch { showToast('Clipboard permission denied — manually paste karo'); }
}

// ── Extract YT video ID ──────────────────────────────────────────────────────
function extractID(url) {
  const m = url.match(/(?:v=|youtu\.be\/|shorts\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

// ── Check server status ──────────────────────────────────────────────────────
async function checkServer() {
  const dot = document.getElementById('statusDot');
  const lbl = document.getElementById('statusLabel');
  try {
    const res = await fetch(COBALT_API + '/', { method: 'GET' });
    if (res.ok) {
      dot.className = 'status-dot online';
      lbl.textContent = 'Server Online';
    } else {
      dot.className = 'status-dot error';
      lbl.textContent = 'Server Error';
    }
  } catch {
    dot.className = 'status-dot error';
    lbl.textContent = 'Offline';
  }
}

// ── Analyze video (get thumbnail from YT directly) ──────────────────────────
async function analyzeVideo() {
  const url = urlInput.value.trim();
  if (!url) { showError('YouTube URL enter karo'); return; }

  const vid = extractID(url);
  if (!vid) { showError('Valid YouTube URL nathi — check karo'); return; }

  currentURL = url;
  const btn = document.getElementById('analyzeBtn');
  btn.innerHTML = `<div class="spinner"></div> Loading…`;
  btn.disabled = true;
  hideError();

  // Use oEmbed to get title & author (no API key needed)
  let title = 'YouTube Video';
  let author = 'YouTube';
  try {
    const oe = await fetch(`https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`);
    if (oe.ok) {
      const d = await oe.json();
      title  = d.title  || title;
      author = d.author_name || author;
    }
  } catch { /* use defaults */ }

  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Analyze`;
  btn.disabled = false;

  showPreview(vid, title, author);
}

function showPreview(vid, title, author) {
  document.getElementById('videoThumb').src = `https://img.youtube.com/vi/${vid}/mqdefault.jpg`;
  document.getElementById('videoTitle').textContent = title;
  document.getElementById('chipChannel').innerHTML = `
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    ${author}`;

  renderQualities();
  document.getElementById('videoPreview').classList.add('visible');
  document.getElementById('dlBar').classList.remove('visible');
  document.getElementById('progressWrap').classList.remove('visible');
  selectedOpt = null;
}

// ── Render quality lists ──────────────────────────────────────────────────────
function renderQualities() {
  document.getElementById('videoList').innerHTML = VIDEO_OPTS.map(o => qualityRow(o, 'vid')).join('');
  document.getElementById('audioList').innerHTML = AUDIO_OPTS.map(o => qualityRow(o, 'aud')).join('');
}

function qualityRow(o, iconClass) {
  const vidIcon = `<path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.54C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="currentColor" stroke="none"/>`;
  const audIcon = `<path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>`;
  return `
    <div class="quality-row" id="row-${o.id}" onclick="selectOpt('${o.id}','${o.label}','${iconClass}')">
      <div class="q-icon ${iconClass}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          ${iconClass === 'vid' ? vidIcon : audIcon}
        </svg>
      </div>
      <div class="q-info">
        <div class="q-name">${o.label}</div>
        <div class="q-sub">${o.sub}</div>
      </div>
      <span class="q-badge">${o.badge}</span>
      <div class="q-radio"></div>
    </div>`;
}

function selectOpt(id, label, iconClass) {
  document.querySelectorAll('.quality-row').forEach(r => r.classList.remove('selected'));
  const row = document.getElementById('row-' + id);
  if (row) row.classList.add('selected');
  selectedOpt = { id, label, iconClass };
  document.getElementById('dlLabel').textContent = label;
  document.getElementById('dlBar').classList.add('visible');
  document.getElementById('progressWrap').classList.remove('visible');
}

function switchTab(tab) {
  currentTab = tab;
  selectedOpt = null;
  document.getElementById('dlBar').classList.remove('visible');
  document.getElementById('progressWrap').classList.remove('visible');
  document.getElementById('tabVideo').classList.toggle('active', tab === 'video');
  document.getElementById('tabAudio').classList.toggle('active', tab === 'audio');
  document.getElementById('tab-video').classList.toggle('active', tab === 'video');
  document.getElementById('tab-audio').classList.toggle('active', tab === 'audio');
}

// ── Build Cobalt API payload ──────────────────────────────────────────────────
function buildPayload(opt) {
  const base = { url: currentURL };

  if (opt.iconClass === 'aud') {
    // Audio only
    base.downloadMode = 'audio';
    if (opt.id === 'mp3-128' || opt.id === 'mp3-320') base.audioFormat = 'mp3';
    else if (opt.id === 'ogg')  base.audioFormat = 'ogg';
    else if (opt.id === 'wav')  base.audioFormat = 'wav';
    else if (opt.id === 'opus') base.audioFormat = 'opus';
    if (opt.id === 'mp3-128') base.audioBitrate = '128';
    if (opt.id === 'mp3-320') base.audioBitrate = '320';
  } else {
    // Video
    base.downloadMode = 'auto';
    base.videoQuality = opt.id; // "2160","1080","720","480","360"
  }

  return base;
}

// ── Start real download ───────────────────────────────────────────────────────
async function startDownload() {
  if (!selectedOpt) return;

  const dlBar      = document.getElementById('dlBar');
  const progressW  = document.getElementById('progressWrap');
  const fill       = document.getElementById('progressFill');
  const lbl        = document.getElementById('progressLbl');
  const pct        = document.getElementById('progressPct');
  const dlBtn      = document.getElementById('dlBtn');

  dlBar.classList.remove('visible');
  progressW.classList.add('visible');
  fill.style.width = '10%';
  lbl.textContent  = 'Cobalt API thi link fetch kari raha chhe…';
  pct.textContent  = '';

  const title = document.getElementById('videoTitle').textContent;

  try {
    const payload = buildPayload(selectedOpt);

    const res = await fetch(COBALT_API + '/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json',
      },
      body: JSON.stringify(payload),
    });

    fill.style.width = '50%';

    const data = await res.json();

    if (!res.ok || data.status === 'error') {
      const msg = data?.error?.code || data?.text || 'Server error aavyo';
      throw new Error(msg);
    }

    fill.style.width = '80%';
    lbl.textContent  = 'Download shuru thashe haji…';

    // Cobalt returns: { status: "redirect"|"tunnel"|"picker", url, filename }
    let downloadUrl = null;

    if (data.status === 'redirect' || data.status === 'tunnel') {
      downloadUrl = data.url;
    } else if (data.status === 'picker') {
      // picker means multiple streams — take first
      downloadUrl = data.picker?.[0]?.url || data.url;
    } else if (data.url) {
      downloadUrl = data.url;
    }

    if (!downloadUrl) throw new Error('Download link mali nahi');

    fill.style.width = '100%';
    lbl.textContent  = 'Download shuru thai gayo!';

    // Trigger download — opens in browser → Android saves to Downloads
    const a = document.createElement('a');
    a.href = downloadUrl;
    a.download = data.filename || (title + '.' + (selectedOpt.iconClass === 'aud' ? 'mp3' : 'mp4'));
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    addHistory({ title, format: selectedOpt.label, status: 'done' });
    showToast('Download shuru! Downloads folder check karo.');

    setTimeout(() => {
      progressW.classList.remove('visible');
      dlBar.classList.add('visible');
    }, 2000);

  } catch (err) {
    fill.style.width = '100%';
    fill.style.background = '#ef4444';
    lbl.textContent = 'Error: ' + err.message;

    addHistory({ title, format: selectedOpt.label, status: 'error' });
    showToast('Error: ' + err.message);

    setTimeout(() => {
      fill.style.background = '';
      fill.style.width = '0%';
      progressW.classList.remove('visible');
      dlBar.classList.add('visible');
    }, 3000);
  }
}

// ── History ──────────────────────────────────────────────────────────────────
function addHistory(item) {
  item.time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  history.unshift(item);
  if (history.length > 30) history = history.slice(0, 30);
  localStorage.setItem('yt_dl_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) {
    el.innerHTML = `<div class="empty">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      <p>Koi download nathi abhi sudhi</p></div>`;
    return;
  }
  el.innerHTML = history.map(h => `
    <div class="history-row">
      <div class="h-icon ${h.status === 'done' ? 'done' : 'err'}">
        ${h.status === 'done'
          ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="20 6 9 17 4 12"/></svg>`
          : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`}
      </div>
      <div class="h-info">
        <div class="h-title">${h.title}</div>
        <div class="h-sub">${h.format} · ${h.time}</div>
      </div>
      <span class="h-status ${h.status === 'done' ? 's-done' : 's-err'}">
        ${h.status === 'done' ? 'Done' : 'Error'}
      </span>
    </div>`).join('');
}

function clearHistory() {
  history = [];
  localStorage.removeItem('yt_dl_history');
  renderHistory();
  showToast('History clear thai gayi');
}

// ── Error / Toast ─────────────────────────────────────────────────────────────
function showError(msg) {
  const b = document.getElementById('errorBanner');
  document.getElementById('errorText').textContent = msg;
  b.classList.add('visible');
}
function hideError() {
  document.getElementById('errorBanner').classList.remove('visible');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Init ──────────────────────────────────────────────────────────────────────
checkServer();
renderHistory();
</script>
